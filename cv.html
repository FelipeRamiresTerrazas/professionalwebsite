<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV — Felipe Ramires Terrazas</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Ctext x='32' y='41' font-size='28' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EFT%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .cv-shell {
            min-height: 100vh;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
        }

        .cv-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cv-topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cv-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .cv-back:hover {
            color: var(--secondary);
        }

        .cv-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .cv-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .cv-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .cv-download-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .cv-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px 32px;
            gap: 16px;
        }

        .cv-embed-wrap {
            flex: 1;
            min-height: 80vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            background: #fff;
        }

        .cv-embed-wrap iframe {
            width: 100%;
            height: 100%;
            min-height: 80vh;
            border: none;
            display: block;
        }

        /* fallback message shown only when iframe fails */
        .cv-fallback {
            display: none;
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .cv-fallback p {
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .cv-topbar {
                padding: 14px 18px;
            }
            .cv-viewer {
                padding: 16px 18px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="cv-shell">

        <!-- Top bar -->
        <header class="cv-topbar">
            <div class="cv-topbar-left">
                <a href="index.html" class="cv-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Back to portfolio
                </a>
                <div>
                    <div class="cv-title">Felipe Ramires Terrazas</div>
                    <div class="cv-subtitle">Data Analyst CV</div>
                </div>
            </div>

            <a class="cv-download-btn"
               href="https://raw.githubusercontent.com/FelipeRamiresTerrazas/cv/main/output/cv_felipe_terrazas_data_analyst.pdf"
               download="cv_felipe_terrazas_data_analyst.pdf"
               target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                     stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download CV
            </a>
        </header>

        <!-- PDF viewer -->
        <div class="cv-viewer">
            <div class="cv-embed-wrap" id="embedWrap">
                <iframe
                    id="cvFrame"
                    src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/FelipeRamiresTerrazas/cv/main/output/cv_felipe_terrazas_data_analyst.pdf&embedded=true"
                    title="Felipe Ramires Terrazas — Data Analyst CV">
                </iframe>
            </div>
        </div>

    </div>
</body>
</html>
